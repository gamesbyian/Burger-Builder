<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger Builder</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeUp {
            0% { transform: translateY(0) scale(0.8); opacity: 0; }
            20% { transform: translateY(-20px) scale(1.1); opacity: 1; }
            80% { transform: translateY(-60px) scale(1); opacity: 1; }
            100% { transform: translateY(-80px) scale(0.9); opacity: 0; }
        }
        .animate-fade-up { animation: fadeUp 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes flicker {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1) translateY(-5px); }
        }
        .animate-flicker { animation: flicker 0.5s infinite alternate; }
        .fire-icon {
            transition: filter 180ms linear, transform 180ms linear;
            transform-origin: center bottom;
        }
        body { background-color: #fffaf0; }
        .trough-bg { background-color: #f3e8d6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        const BASE_INGREDIENTS = [
            { type: 'top_bun', label: 'Crown', weight: 23 },
            { type: 'bottom_bun', label: 'Heel', weight: 11 },
            { type: 'patty', label: 'Patty', weight: 20 },
            { type: 'cheese', label: 'Cheese', weight: 16 },
            { type: 'lettuce', label: 'Lettuce', weight: 9 },
            { type: 'tomato', label: 'Tomato', weight: 9 },
            { type: 'bacon', label: 'Bacon', weight: 7 },
            { type: 'onion', label: 'Onion', weight: 7 },
            { type: 'pickle', label: 'Pickle', weight: 7 },
            { type: 'egg', label: 'Fried Egg', weight: 7 },
            { type: 'ketchup', label: 'Ketchup', weight: 7 },
            { type: 'mustard', label: 'Mustard', weight: 7 },
            { type: 'mayo', label: 'Mayo', weight: 7 },
        ];

        const ROWS = 8;
        const COLS = 6;
        const FIRE_SPAWN_MIN = 35;
        const FIRE_SPAWN_MAX = 50;
        const FIRE_SPREAD_INTERVAL = 30;
        const FIRE_START_AFTER_CLEARS = 7;
        const FIRE_WARNING_WINDOW = 5;
        const SPATULA_MAX_CHARGES = 2;
        const SPATULA_PASSIVE_CHARGE_PER_SECOND = 1 / 30;
        const WASTE_PENALTY_MULTIPLIER = 10;
        const WASTE_PENALTY_EXPONENT = 2;
        const SPOILT_CHANCE = 0.12;
        const SPOILT_PREFIXES = ['Rotten', 'Slimy', 'Moldy'];
        const SPOILABLE_TYPES = new Set([
            'patty', 'cheese', 'lettuce', 'tomato', 'bacon', 'onion', 'pickle', 'egg', 'ketchup', 'mustard', 'mayo'
        ]);

        const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

        const spawnFireSettings = () => ({
            untilSpawn: randomInt(FIRE_SPAWN_MIN, FIRE_SPAWN_MAX),
            untilSpread: FIRE_SPREAD_INTERVAL,
        });

        const maybeSpoilIngredient = (ingredient) => {
            if (!SPOILABLE_TYPES.has(ingredient.type)) {
                return { ...ingredient, isSpoilt: false };
            }
            if (Math.random() >= SPOILT_CHANCE) {
                return { ...ingredient, isSpoilt: false };
            }
            const prefix = SPOILT_PREFIXES[Math.floor(Math.random() * SPOILT_PREFIXES.length)];
            return {
                ...ingredient,
                isSpoilt: true,
                label: `${prefix} ${ingredient.label}`,
            };
        };

        const getIngredientWithWeights = (board) => {
            const hasHeels = board.some(col => col.some(item => item.type === 'bottom_bun'));
            
            // If no heels exist, increase heel odds so recovery remains likely
            const currentWeights = BASE_INGREDIENTS.map(ing => {
                if (!hasHeels && ing.type === 'bottom_bun') {
                    return { ...ing, weight: 38 };
                }
                return ing;
            });

            const totalWeight = currentWeights.reduce((acc, item) => acc + item.weight, 0);
            let r = Math.random() * totalWeight;
            
            for (const item of currentWeights) {
                if (r < item.weight) return { id: crypto.randomUUID(), ...maybeSpoilIngredient(item) };
                r -= item.weight;
            }
            return { id: crypto.randomUUID(), ...maybeSpoilIngredient(currentWeights[2]) };
        };

        const getInitialBoard = () => 
            Array.from({ length: COLS }, () => [{ id: crypto.randomUUID(), type: 'bottom_bun', label: 'Heel', isSpoilt: false }]);

        const IngredientIcon = ({ type, className = "", isSpoilt = false }) => {
            const spoilFx = isSpoilt ? 'brightness-[0.85] saturate-[0.75] hue-rotate-[55deg]' : '';
            const baseClass = `w-full h-full drop-shadow-sm ${spoilFx} ${className}`;
            switch (type) {
                case 'bottom_bun':
                    return (
                        <svg viewBox="0 0 100 100" className={baseClass}>
                            <path d="M 10 20 L 90 20 L 90 65 Q 90 75 80 75 L 20 75 Q 10 75 10 65 Z" fill="#EDBA69" />
                            <path d="M 10 20 L 90 20 L 90 30 Q 50 35 10 30 Z" fill="#FDE08B" opacity="0.4" />
                        </svg>
                    );
                case 'top_bun':
                    return <svg viewBox="0 0 100 100" className={baseClass}><path d="M 10 80 L 90 80 Q 90 20 50 20 Q 10 20 10 80 Z" fill="#EDBA69" /><ellipse cx="30" cy="45" rx="2" ry="4" fill="#FFF" transform="rotate(-30 30 45)" /><ellipse cx="50" cy="35" rx="2" ry="4" fill="#FFF" transform="rotate(10 50 35)" /><ellipse cx="70" cy="50" rx="2" ry="4" fill="#FFF" transform="rotate(40 70 50)" /><ellipse cx="40" cy="55" rx="2" ry="4" fill="#FFF" transform="rotate(-15 40 55)" /><ellipse cx="60" cy="60" rx="2" ry="4" fill="#FFF" transform="rotate(25 60 60)" /></svg>;
                case 'patty':
                    return <svg viewBox="0 0 100 100" className={baseClass}><rect x="10" y="30" width="80" height="40" rx="15" fill="#5C3A21" /><line x1="20" y1="45" x2="80" y2="45" stroke="#3E2514" strokeWidth="3" strokeDasharray="6,4" strokeLinecap="round" /></svg>;
                case 'cheese':
                    return <svg viewBox="0 0 100 100" className={baseClass}><path d="M 5 40 L 95 40 L 85 60 L 70 50 L 55 70 L 40 50 L 25 65 L 10 50 Z" fill="#FBBF24" /></svg>;
                case 'lettuce':
                    return <svg viewBox="0 0 100 100" className={baseClass}><path d="M 5 50 Q 15 30 25 50 T 45 50 T 65 50 T 85 50 Q 95 30 95 50 Q 85 70 75 50 T 55 50 T 35 50 T 15 50 Q 5 70 5 50 Z" fill="#84CC16" /></svg>;
                case 'tomato':
                    return (
                        <svg viewBox="0 0 100 100" className={baseClass}>
                            <ellipse cx="50" cy="50" rx="42" ry="18" fill="#EF4444" stroke="#B91C1C" strokeWidth="2" />
                            <ellipse cx="50" cy="50" rx="36" ry="14" fill="#DC2626" opacity="0.6" />
                            <circle cx="30" cy="50" r="3" fill="#FDE68A" />
                            <circle cx="70" cy="50" r="3" fill="#FDE68A" />
                            <circle cx="50" cy="42" r="2.5" fill="#FDE68A" />
                            <circle cx="50" cy="58" r="2.5" fill="#FDE68A" />
                            <ellipse cx="50" cy="50" rx="36" ry="14" fill="none" stroke="#B91C1C" strokeWidth="1" opacity="0.3" />
                            <line x1="14" y1="50" x2="86" y2="50" stroke="#B91C1C" strokeWidth="1" opacity="0.3" />
                            <line x1="50" y1="32" x2="50" y2="68" stroke="#B91C1C" strokeWidth="1" opacity="0.3" />
                        </svg>
                    );
                case 'bacon':
                    return <svg viewBox="0 0 100 100" className={baseClass}><path d="M 10 40 Q 25 25 40 40 T 70 40 T 95 40" stroke="#991B1B" strokeWidth="8" fill="none" strokeLinecap="round" /><path d="M 15 45 Q 25 35 40 45 T 70 45 T 90 45" stroke="#FCA5A5" strokeWidth="3" fill="none" strokeLinecap="round" /></svg>;
                case 'egg':
                    return (
                        <svg viewBox="0 0 100 100" className={baseClass}>
                            <ellipse cx="50" cy="50" rx="42" ry="24" fill="#FFFFFF" />
                            <ellipse cx="48" cy="48" rx="38" ry="20" fill="#F9FAFB" opacity="0.5" />
                            <ellipse cx="52" cy="48" rx="16" ry="10" fill="#FBBF24" />
                            <ellipse cx="50" cy="46" rx="6" ry="3" fill="#FFF" opacity="0.4" />
                        </svg>
                    );
                case 'pickle':
                    return (
                        <svg viewBox="0 0 100 100" className={baseClass}>
                            <ellipse cx="32" cy="50" rx="18" ry="10" fill="#4ADE80" stroke="#166534" strokeWidth="3" />
                            <ellipse cx="68" cy="50" rx="18" ry="10" fill="#4ADE80" stroke="#166534" strokeWidth="3" />
                            <circle cx="28" cy="48" r="1.5" fill="#166534" opacity="0.3" />
                            <circle cx="36" cy="52" r="1.5" fill="#166534" opacity="0.3" />
                            <circle cx="64" cy="48" r="1.5" fill="#166534" opacity="0.3" />
                            <circle cx="72" cy="52" r="1.5" fill="#166534" opacity="0.3" />
                        </svg>
                    );
                case 'onion':
                    return (
                        <svg viewBox="0 0 100 100" className={baseClass}>
                            <ellipse cx="50" cy="50" rx="42" ry="16" fill="none" stroke="#D946EF" strokeWidth="5" />
                            <ellipse cx="50" cy="50" rx="32" ry="12" fill="none" stroke="#D946EF" strokeWidth="3" opacity="0.8" />
                            <ellipse cx="50" cy="50" rx="22" ry="8" fill="none" stroke="#D946EF" strokeWidth="2" opacity="0.6" />
                            <ellipse cx="50" cy="50" rx="12" ry="4" fill="none" stroke="#D946EF" strokeWidth="1" opacity="0.4" />
                        </svg>
                    );
                case 'ketchup':
                    return <svg viewBox="0 0 100 100" className={baseClass}><path d="M 15 50 Q 30 20 45 50 T 85 50" stroke="#EF4444" strokeWidth="12" fill="none" strokeLinecap="round" /></svg>;
                case 'mustard':
                    return <svg viewBox="0 0 100 100" className={baseClass}><path d="M 15 50 Q 30 80 45 50 T 85 50" stroke="#EAB308" strokeWidth="12" fill="none" strokeLinecap="round" /></svg>;
                case 'mayo':
                    return <svg viewBox="0 0 100 100" className={baseClass}><path d="M 15 50 Q 30 20 45 50 T 85 50" stroke="#F3F4F6" strokeWidth="12" fill="none" strokeLinecap="round" /></svg>;
                case 'spatula':
                    return (
                        <svg viewBox="0 0 100 100" className={baseClass}>
                            <rect x="42" y="35" width="16" height="55" rx="4" fill="#4B5563" />
                            <rect x="20" y="5" width="60" height="40" rx="4" fill="#94A3B8" />
                            <line x1="35" y1="12" x2="35" y2="32" stroke="#4B5563" strokeWidth="4" strokeLinecap="round" />
                            <line x1="50" y1="12" x2="50" y2="32" stroke="#4B5563" strokeWidth="4" strokeLinecap="round" />
                            <line x1="65" y1="12" x2="65" y2="32" stroke="#4B5563" strokeWidth="4" strokeLinecap="round" />
                        </svg>
                    );
                default:
                    return null;
            }
        };

        const FireOverlayIcon = ({ untilSpread }) => {
            const warningTimeLeft = Math.max(0, Math.min(FIRE_WARNING_WINDOW, untilSpread));
            const warningProgress = 1 - (warningTimeLeft / FIRE_WARNING_WINDOW);
            const inWarning = untilSpread <= FIRE_WARNING_WINDOW;
            const flickerDuration = inWarning
                ? `${Math.max(0.16, 0.45 - (warningProgress * 0.28)).toFixed(2)}s`
                : '0.5s';
            const flameLift = inWarning ? -4 - (warningProgress * 9) : -2;
            const brightness = inWarning ? 1.05 + (warningProgress * 0.95) : 1;
            const saturation = inWarning ? 1.05 + (warningProgress * 0.55) : 1;
            const scale = inWarning ? 1 + (warningProgress * 0.22) : 1;

            return (
                <svg
                    viewBox="0 0 100 100"
                    className="w-10 h-10 animate-flicker fire-icon"
                    style={{
                        animationDuration: flickerDuration,
                        transform: `translateY(${flameLift}px) scale(${scale})`,
                        filter: `brightness(${brightness}) saturate(${saturation})`,
                    }}
                >
                    <path d="M50 90 Q30 90 20 70 Q10 50 30 30 Q50 0 70 30 Q90 50 80 70 Q70 90 50 90" fill="#f97316" />
                    <path d="M50 85 Q35 85 25 70 Q20 55 35 45 Q50 20 65 45 Q80 55 75 70 Q65 85 50 85" fill="#facc15" />
                    <path d="M50 80 Q40 80 35 70 Q30 60 40 55 Q50 40 60 55 Q70 60 65 70 Q60 80 50 80" fill="#ffffff" />
                </svg>
            );
        };

        const findBurger = (column) => {
            for (let i = column.length - 1; i >= 0; i--) {
                if (column[i].type === 'top_bun') {
                    for (let j = i - 1; j >= 0; j--) {
                        if (column[j].type === 'top_bun') break;
                        if (column[j].type === 'bottom_bun') {
                            return { startIndex: j, endIndex: i };
                        }
                    }
                }
            }
            return null;
        };

        const calculateScore = (burgerSlice) => {
            let pts = 100;
            let messages = [];
            
            const innerItems = burgerSlice.slice(1, -1);
            const inner = innerItems.map(item => item.type);
            const totalSize = burgerSlice.length;

            pts += inner.length * 50;

            const counts = inner.reduce((acc, type) => { acc[type] = (acc[type] || 0) + 1; return acc; }, {});
            const numPatties = counts['patty'] || 0;
            const numCheese = counts['cheese'] || 0;
            
            if (totalSize === ROWS) {
                pts += 500;
                messages.push("Skyscraper Bonus! (+500)");
            }

            if (numPatties > 0 && numPatties === numCheese) {
                pts += 250;
                messages.push("Perfect Ratio! (+250)");
            }

            const hasDuplicates = inner.some(type => counts[type] > 1);
            if (inner.length >= 4 && !hasDuplicates) {
                pts += 300;
                messages.push("Variety Pack! (+300)");
            }

            const possiblePenalties = [];
            if (inner.length === 0) {
                possiblePenalties.push({ score: -150, msg: "What's The Point? (-150)", weight: 10 });
            } else if (numPatties === 0) {
                possiblePenalties.push({ score: -100, msg: "Where's the Beef?! (-100)", weight: 5 });
            }

            if (possiblePenalties.length > 0) {
                const worstPenalty = possiblePenalties.sort((a, b) => b.weight - a.weight)[0];
                pts += worstPenalty.score;
                messages.push(worstPenalty.msg);
            }

            const hasPatty = numPatties > 0;
            const hasCheese = numCheese > 0;
            const hasEgg = (counts['egg'] || 0) > 0;
            const hasBacon = (counts['bacon'] || 0) > 0;

            if (hasCheese && !hasPatty) messages.push("Grilled Cheese!");
            if (hasCheese && hasEgg && hasBacon && !hasPatty) messages.push("Breakfast Sammie!");

            const spoiltCount = burgerSlice.filter(item => item.isSpoilt).length;
            const goodCount = totalSize - spoiltCount;
            const multiplier = Math.min(1, Math.max(0, goodCount / totalSize));
            const finalPoints = Math.max(10, Math.round(pts * multiplier));
            if (spoiltCount > 0) {
                messages.push(`Spoilage x${multiplier.toFixed(2)}`);
            }

            return { points: finalPoints, messages };
        };

        const clampSpatulaCharge = (charge) => Math.max(0, Math.min(SPATULA_MAX_CHARGES, charge));

        const calculateSpatulaChargeGain = (points) => {
            const clearContribution = points / 1200;
            const highScoreBonus = points >= 900 ? 0.35 : points >= 650 ? 0.2 : 0;
            return clearContribution + highScoreBonus;
        };

        const calculateWastePenalty = (clearedCount) => (
            Math.pow(clearedCount, WASTE_PENALTY_EXPONENT) * WASTE_PENALTY_MULTIPLIER
        );

        function App() {
            const [board, setBoard] = useState(getInitialBoard);
            const [active, setActive] = useState(() => getIngredientWithWeights(getInitialBoard()));
            const [nextItems, setNextItems] = useState(() => [
                getIngredientWithWeights(getInitialBoard()), 
                getIngredientWithWeights(getInitialBoard())
            ]);
            const [score, setScore] = useState(0);
            const [gameOver, setGameOver] = useState(false);
            const [animating, setAnimating] = useState(false);
            const [clearingState, setClearingState] = useState(null);
            const [popups, setPopups] = useState([]);
            const [fireColumns, setFireColumns] = useState([]);
            const [fireTimers, setFireTimers] = useState(spawnFireSettings);
            const [fireCycle, setFireCycle] = useState(0);
            const [spatulaCharge, setSpatulaCharge] = useState(0);
            const [spatulaPrimed, setSpatulaPrimed] = useState(false);
            const [burgersCleared, setBurgersCleared] = useState(0);

            // Ref to track state for async closures
            const boardRef = useRef(board);
            const fireColumnsRef = useRef(fireColumns);
            const fireTimersRef = useRef(fireTimers);
            const burgersClearedRef = useRef(burgersCleared);
            useEffect(() => { boardRef.current = board; }, [board]);
            useEffect(() => { fireColumnsRef.current = fireColumns; }, [fireColumns]);
            useEffect(() => { fireTimersRef.current = fireTimers; }, [fireTimers]);
            useEffect(() => { burgersClearedRef.current = burgersCleared; }, [burgersCleared]);

            const advanceFireTurn = useCallback(() => {
                if (burgersClearedRef.current < FIRE_START_AFTER_CLEARS) return;

                const prevCols = fireColumnsRef.current;
                const prevTimers = fireTimersRef.current;
                let nextCols = [...prevCols];
                let untilSpread = nextCols.length > 0 ? prevTimers.untilSpread - 1 : FIRE_SPREAD_INTERVAL;
                let untilSpawn = prevTimers.untilSpawn - 1;

                if (nextCols.length > 0 && untilSpread <= 0) {
                    const source = nextCols[Math.floor(Math.random() * nextCols.length)];
                    const options = [source - 1, source + 1].filter(idx => idx >= 0 && idx < COLS && !nextCols.includes(idx));
                    if (options.length > 0) {
                        nextCols.push(options[Math.floor(Math.random() * options.length)]);
                        nextCols.sort((a, b) => a - b);
                    }
                    untilSpread = FIRE_SPREAD_INTERVAL;
                    setFireCycle(prev => prev + 1);
                }

                if (untilSpawn <= 0) {
                    const spawnable = Array.from({ length: COLS }, (_, i) => i).filter(i => !nextCols.includes(i));
                    if (spawnable.length > 0) {
                        const hadNoFire = nextCols.length === 0;
                        nextCols.push(spawnable[Math.floor(Math.random() * spawnable.length)]);
                        nextCols.sort((a, b) => a - b);
                        if (hadNoFire) {
                            untilSpread = FIRE_SPREAD_INTERVAL;
                            setFireCycle(prev => prev + 1);
                        }
                    }
                    untilSpawn = randomInt(FIRE_SPAWN_MIN, FIRE_SPAWN_MAX);
                }

                setFireColumns(nextCols);
                setFireTimers({ untilSpawn, untilSpread });
            }, []);

            useEffect(() => {
                if (gameOver || animating) return;
                const timer = setInterval(() => {
                    advanceFireTurn();
                }, 1000);
                return () => clearInterval(timer);
            }, [gameOver, animating, advanceFireTurn]);

            useEffect(() => {
                const isBoardEmpty = board.every(col => col.length === 0);
                if (isBoardEmpty && !animating && !gameOver) {
                    setBoard(getInitialBoard());
                }
            }, [board, animating, gameOver]);

            useEffect(() => {
                const allFull = board.every(col => col.length >= ROWS);
                if (allFull && !animating) {
                    const canMove = board.some((col, colIdx) => {
                        const isBurning = fireColumns.includes(colIdx);
                        if (spatulaPrimed) return true;
                        if (isBurning) return false;
                        if (active.type === 'top_bun') return findBurger([...col, active]) !== null;
                        return false;
                    });
                    if (!canMove) setGameOver(true);
                }
            }, [board, active, animating, fireColumns, spatulaPrimed]);

            useEffect(() => {
                if (gameOver) return;
                const timer = setInterval(() => {
                    setSpatulaCharge(prev => clampSpatulaCharge(prev + SPATULA_PASSIVE_CHARGE_PER_SECOND));
                }, 1000);
                return () => clearInterval(timer);
            }, [gameOver]);

            useEffect(() => {
                if (animating || gameOver) return;
                for (let col = 0; col < COLS; col++) {
                    const match = findBurger(board[col]);
                    if (match) {
                        setAnimating(true);
                        setClearingState({ col, start: match.startIndex, end: match.endIndex });
                        const slice = board[col].slice(match.startIndex, match.endIndex + 1);
                        const { points, messages } = calculateScore(slice);
                        setBurgersCleared(prev => prev + 1);
                        setScore(s => s + points);
                        setSpatulaCharge(prev => clampSpatulaCharge(prev + calculateSpatulaChargeGain(points)));
                        const popupId = crypto.randomUUID();
                        setPopups(p => [...p, { id: popupId, col, points, messages, type: 'score' }]);
                        setTimeout(() => setPopups(p => p.filter(popup => popup.id !== popupId)), 2000);
                        setTimeout(() => {
                            setBoard(prev => {
                                const newBoard = [...prev];
                                const newCol = [...newBoard[col]];
                                newCol.splice(match.startIndex, match.endIndex - match.startIndex + 1);
                                newBoard[col] = newCol;
                                return newBoard;
                            });
                            setClearingState(null);
                            setAnimating(false);
                        }, 800);
                        return;
                    }
                }
            }, [board, animating, gameOver]);

            const dropItem = useCallback((colIndex) => {
                if (gameOver || animating) return;

                const col = board[colIndex];
                const isBurning = fireColumns.includes(colIndex);

                if (isBurning && !spatulaPrimed) return;
                
                if (spatulaPrimed) {
                    if (spatulaCharge < 1) {
                        setSpatulaPrimed(false);
                        return;
                    }
                    const clearedCount = col.length;
                    const penalty = calculateWastePenalty(clearedCount);
                    setAnimating(true);
                    setSpatulaCharge(prev => clampSpatulaCharge(prev - 1));
                    setSpatulaPrimed(false);
                    setScore(s => s - penalty);
                    const popupId = crypto.randomUUID();
                    setPopups(p => [...p, { id: popupId, col: colIndex, points: penalty, messages: [`Waste -${penalty}`], type: 'waste' }]);
                    setTimeout(() => setPopups(p => p.filter(popup => popup.id !== popupId)), 2000);
                    // Spatulas always extinguish fire in their target column
                    if (isBurning) {
                        setFireColumns(prev => prev.filter(idx => idx !== colIndex));
                    }
                    // Clear the entire column
                    setClearingState({ col: colIndex, start: 0, end: col.length, isSpatula: true });
                    setTimeout(() => {
                        setBoard(prev => {
                            const newBoard = [...prev];
                            // Always reset with a heel
                            newBoard[colIndex] = [{ id: crypto.randomUUID(), type: 'bottom_bun', label: 'Heel', isSpoilt: false }];
                            return newBoard;
                        });
                        setClearingState(null);
                        setAnimating(false);
                    }, 500);
                    return;
                }

                const isFull = col.length >= ROWS;
                if (isFull) {
                    if (active.type !== 'top_bun') return;
                    if (!findBurger([...col, active])) return;
                }

                const newBoardState = board.map((c, i) => i === colIndex ? [...c, active] : c);
                setBoard(newBoardState);

                const nextActive = nextItems[0];
                const nextQueue = [nextItems[1], getIngredientWithWeights(newBoardState)];
                setActive(nextActive);
                setNextItems(nextQueue);
            }, [gameOver, animating, board, active, nextItems, fireColumns, spatulaPrimed, spatulaCharge]);

            const resetGame = () => {
                const initialBoard = getInitialBoard();
                setBoard(initialBoard);
                setActive(getIngredientWithWeights(initialBoard));
                setNextItems([getIngredientWithWeights(initialBoard), getIngredientWithWeights(initialBoard)]);
                setScore(0);
                setGameOver(false);
                setClearingState(null);
                setPopups([]);
                setFireColumns([]);
                setFireTimers(spawnFireSettings());
                setFireCycle(0);
                setSpatulaCharge(0);
                setSpatulaPrimed(false);
                setBurgersCleared(0);
            };

            const spatulaChargesAvailable = Math.floor(spatulaCharge);
            const spatulaProgressPercent = Math.round((spatulaCharge % 1) * 100);
            const spatulaReady = spatulaChargesAvailable > 0;

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-4">
                    <div className="w-full max-w-md flex justify-between items-end mb-6">
                        <div>
                            <h1 className="text-3xl font-black text-orange-900 leading-none mb-1 uppercase tracking-tight">Burger Builder</h1>
                            <div className="flex items-center gap-4">
                                <p className="text-orange-700 font-bold text-xl bg-orange-200 inline-block px-3 py-1 rounded-full shadow-sm whitespace-nowrap">
                                    {score.toLocaleString()}
                                </p>
                                <button
                                    className={`relative overflow-hidden px-2.5 py-1.5 rounded-xl border-2 font-black text-xs uppercase tracking-wide transition-all shrink-0
                                        ${spatulaPrimed
                                            ? 'bg-sky-600 border-sky-700 text-white shadow-lg scale-105'
                                            : spatulaReady
                                                ? 'bg-sky-100 border-sky-300 text-sky-900 hover:bg-sky-200'
                                                : 'bg-slate-100 border-slate-300 text-slate-500 cursor-not-allowed'
                                        }`}
                                    disabled={!spatulaReady}
                                    onClick={() => setSpatulaPrimed(prev => !prev)}
                                >
                                    <div
                                        className="absolute bottom-0 left-0 h-full bg-sky-300/60 transition-all duration-500"
                                        style={{ width: `${spatulaReady ? 100 : spatulaProgressPercent}%` }}
                                    />
                                    <div className="relative flex items-center gap-2">
                                        <div className="w-5 h-5"><IngredientIcon type="spatula" /></div>
                                        <span className="bg-white/80 text-sky-900 rounded-full min-w-5 h-5 px-1 flex items-center justify-center">
                                            {spatulaChargesAvailable}
                                        </span>
                                    </div>
                                </button>
                            </div>
                        </div>

                        <div className="flex flex-col items-end">
                            <span className="text-xs font-bold text-orange-600 mb-1 uppercase tracking-widest">Next Up</span>
                            <div className="flex gap-2 bg-white/60 p-2 rounded-xl border-2 border-orange-200 shadow-sm backdrop-blur-sm">
                                <div className="flex flex-col items-center">
                                    <div className="w-14 h-14 flex items-center justify-center bg-orange-100 rounded-lg relative mb-1">
                                        <div className="w-11 h-11 animate-bounce">
                                            <IngredientIcon type={active.type} isSpoilt={active.isSpoilt} />
                                        </div>
                                    </div>
                                    <span className="text-[10px] font-black uppercase text-orange-800 tracking-tighter min-w-[70px] text-center">{active.label}</span>
                                </div>
                                <div className="flex flex-col items-center">
                                    <div className="w-10 h-10 flex items-center justify-center bg-orange-100/50 rounded-lg opacity-40 mt-2">
                                        <IngredientIcon type={nextItems[0].type} isSpoilt={nextItems[0].isSpoilt} />
                                    </div>
                                    <span className="text-[9px] font-black uppercase text-orange-700 tracking-tight min-w-[56px] text-center mt-1">
                                        {nextItems[0].label}
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="relative">
                        <div className="trough-bg rounded-2xl p-3 border-4 border-orange-300 shadow-xl relative">
                            <div className="flex gap-1">
                                {board.map((col, colIndex) => {
                                    const colIsFull = col.length >= ROWS;
                                    const isBurning = fireColumns.includes(colIndex);
                                    const canDropCrown = colIsFull && active.type === 'top_bun' && findBurger([...col, active]);
                                    const canDropSpatula = spatulaPrimed && spatulaCharge >= 1;
                                    const isDisabled = colIsFull && !canDropCrown && !canDropSpatula;
                                    const blockedByFire = isBurning && !canDropSpatula;
                                    
                                    return (
                                        <div 
                                            key={colIndex}
                                            className={`relative w-14 h-[400px] flex flex-col-reverse rounded-xl transition-colors
                                                ${isDisabled || blockedByFire ? 'cursor-not-allowed opacity-80' : 'cursor-pointer hover:bg-orange-50/20'}
                                                ${isBurning ? 'bg-orange-400/20' : ''}`}
                                            onClick={() => dropItem(colIndex)}
                                        >
                                            {col.map((item, rowIndex) => {
                                                const isClearing = clearingState?.col === colIndex && rowIndex >= clearingState.start && rowIndex <= clearingState.end;
                                                const spatulaAnim = isClearing && clearingState.isSpatula;
                                                return (
                                                    <div key={item.id} className={`w-14 h-[50px] flex items-center justify-center transition-all duration-300 
                                                        ${isClearing ? (spatulaAnim ? 'scale-0 opacity-0 -translate-y-10' : 'animate-pulse scale-110 brightness-110 drop-shadow-lg z-10') : 'drop-shadow-sm'}`}>
                                                        <div className="w-14 h-14 absolute">
                                                            <IngredientIcon type={item.type} isSpoilt={item.isSpoilt} />
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            {isBurning && (
                                                <div className="absolute bottom-1 left-1/2 -translate-x-1/2 pointer-events-none">
                                                    <FireOverlayIcon key={`${colIndex}-${fireCycle}`} untilSpread={fireTimers.untilSpread} />
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>

                            {popups.map(popup => (
                                <div key={popup.id} className="absolute pointer-events-none flex flex-col items-center justify-end z-20 animate-fade-up"
                                    style={{ left: `${(popup.col * 60) + 12}px`, bottom: '50%', width: '100px', marginLeft: '-22px' }}>
                                    {popup.type === 'waste' ? (
                                        <>
                                            <div className="text-2xl font-black text-amber-800 drop-shadow-sm">-{popup.points}</div>
                                            <div className="text-xs font-bold text-center mt-1 px-2 py-0.5 rounded shadow-sm bg-stone-700 text-orange-100">
                                                {popup.messages[0]}
                                            </div>
                                        </>
                                    ) : (
                                        <>
                                            <div className="text-2xl font-black text-green-600 drop-shadow-sm">+{popup.points}</div>
                                            {popup.messages.map((msg, i) => (
                                                <div key={i} className={`text-xs font-bold text-center mt-1 px-1 rounded shadow-sm ${msg.includes('-') ? 'bg-red-500 text-white' : 'bg-yellow-400 text-yellow-900'}`}>
                                                    {msg}
                                                </div>
                                            ))}
                                        </>
                                    )}
                                </div>
                            ))}

                            {gameOver && (
                                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm flex flex-col items-center justify-center z-30 rounded-xl px-4 text-center">
                                    <h2 className="text-4xl font-black text-white mb-2 transform -rotate-2">KITCHEN CLOSED</h2>
                                    <p className="text-lg text-orange-200 font-bold mb-6">The tray is full. No more burgers today!</p>
                                    <div className="bg-white/10 p-4 rounded-2xl mb-6">
                                        <span className="text-white text-sm block uppercase tracking-widest opacity-60">Final Tally</span>
                                        <span className="text-4xl text-orange-400 font-black">{score.toLocaleString()}</span>
                                    </div>
                                    <button onClick={resetGame} className="bg-orange-500 hover:bg-orange-400 text-white font-black py-3 px-8 rounded-full shadow-[0_4px_0_rgb(194,65,12)] active:translate-y-1 active:shadow-none transition-all text-xl">
                                        RE-OPEN SHOP
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="mt-8 text-center text-orange-800/60 font-medium max-w-sm text-sm">
                        <p><strong>Spatula tool:</strong> charges over time and from burger clears.</p>
                        <p>Prime it with the button, then tap a column to clear it and leave a heel bun.</p>
                        <p>If the whole tray clears, you get a fresh row of heels.</p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
